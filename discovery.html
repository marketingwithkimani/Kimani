<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery Session | Marketing with Kimani</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/Logo Kimani.png">
  <style>
    :root {
      --clr-bg-deep: #050505;
      --clr-accent: #c8f230;
      --glass: rgba(255, 255, 255, 0.03);
    }
    body { 
      background-color: var(--clr-bg-deep); 
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .discovery-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 1rem;
      padding-bottom: 2rem;
      box-sizing: border-box;
      min-height: 600px; /* Ensure a decent size */
    }

    .chat-window {
      flex: 1;
      min-height: 500px;
      background: var(--clr-bg2);
      border: 1px solid var(--clr-border);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      position: relative;
    }

    .chat-header {
      padding: 1.5rem 2.5rem;
      background: var(--clr-bg3);
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-info { display: flex; gap: 1rem; align-items: center; }
    .agent-avatar { width: 48px; height: 48px; background: var(--clr-accent); color: #0b0b0b; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
    .agent-name { font-weight: 700; color: var(--clr-white); font-size: 1.1rem; }
    .agent-status { font-size: 0.8rem; color: var(--clr-accent); opacity: 0.8; }

    .chat-messages { 
      flex: 1; 
      padding: 2.5rem; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 1.5rem;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--clr-border); border-radius: 10px; }

    .message { 
      max-width: 75%; 
      padding: 1.2rem 1.6rem; 
      border-radius: 20px; 
      line-height: 1.6; 
      font-size: 1rem; 
      animation: fadeInUp 0.5s ease forwards;
      position: relative;
    }
    .message.assistant { 
      align-self: flex-start; 
      background: var(--clr-bg3); 
      color: var(--clr-white); 
      border-bottom-left-radius: 4px; 
      border: 1px solid var(--clr-border);
    }
    .message.user { 
      align-self: flex-end; 
      background: var(--clr-accent); 
      color: #0b0b0b; 
      border-bottom-right-radius: 4px; 
      font-weight: 500;
    }

    .chat-input-area { 
      padding: 2rem 2.5rem; 
      background: var(--clr-bg3); 
      border-top: 1px solid var(--clr-border); 
      display: flex; 
      gap: 1rem;
      align-items: flex-end;
    }
    #chatInput { 
      flex: 1; 
      background: var(--clr-bg2); 
      border: 1px solid var(--clr-border); 
      padding: 1rem 1.5rem; 
      border-radius: 16px; 
      color: var(--clr-white); 
      outline: none; 
      font-family: var(--ff-body);
      font-size: 1rem;
      resize: none;
      max-height: 150px;
      transition: border-color 0.3s;
    }
    #chatInput:focus { border-color: var(--clr-accent); }
    
    .typing-indicator { display: flex; gap: 5px; padding: 10px 0; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--clr-accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .finish-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,0.9);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem;
      z-index: 10;
    }
    .finish-overlay h2 { margin-bottom: 1rem; color: var(--clr-accent); }
    .finish-overlay p { color: var(--clr-muted); max-width: 500px; margin-bottom: 2rem; }

  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="container">
    <div class="nav-wrap">
      <a href="index.html" class="nav-logo">
        <img src="assets/Logo Kimani.png" alt="Kimani Logo">
        <span class="logo-text">Marketing with Kimani</span>
      </a>
      <div class="nav-menu">
        <a href="relationship-engine.html">Back to Engine</a>
      </div>
    </div>
  </div>
</nav>

<!-- ══ PAGE IDENTIFIER ═══════════════════════════════════════════ -->
<div style="padding: 100px 0 20px 0; border-bottom: 1px solid var(--clr-border); background: #000;">
  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: flex-end;">
      <div>
        <span class="badge" style="margin-bottom: 0.5rem;">ONBOARDING</span>
        <h2 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--clr-muted); margin: 0;">Discovery Session</h2>
      </div>
      <div style="text-align: right; display: flex; align-items: center; gap: 1rem;">
         <div style="text-align: right;">
           <div style="font-size: 0.7rem; color: var(--clr-muted); text-transform: uppercase;">Session ID</div>
           <div style="font-weight: 700; color: var(--clr-white); font-size: 0.9rem; font-family: monospace;" id="displaySessionId">--------</div>
         </div>
      </div>
    </div>
  </div>
</div>

<div class="discovery-container">
  <div class="chat-window">
    <div class="chat-header">
      <div class="header-info">
        <div class="agent-avatar">R</div>
        <div>
          <div class="agent-name">Relationship Agent</div>
          <div class="agent-status">Onboarding Discovery</div>
        </div>
      </div>
      <div style="font-size: 0.75rem; color: var(--clr-accent); border: 1px solid var(--clr-accent); padding: 0.3rem 0.8rem; border-radius: 6px; font-weight: 700; letter-spacing: 0.05em;">SECURE SESSION</div>
    </div>
    
    <div class="chat-messages" id="chatMessages"></div>
    
    <div class="chat-input-area" id="inputArea">
      <textarea id="chatInput" rows="1" placeholder="Type your answer..."></textarea>
      <button id="sendBtn" class="btn btn-primary" style="padding: 1rem 1.8rem;">Send</button>
    </div>

    <div class="finish-overlay" id="finishOverlay">
      <div style="font-size: 4rem; margin-bottom: 2rem;">🤝🏾</div>
      <h2>Strategic Handover Initiated</h2>
      <p id="finishText"></p>
      <a href="index.html" class="btn btn-primary">Return to Homepage</a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const inputArea = document.getElementById('inputArea');
  const finishOverlay = document.getElementById('finishOverlay');
  const finishText = document.getElementById('finishText');

  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3010' : '';
  const userData = JSON.parse(sessionStorage.getItem('onboarding_user') || '{}');
  
  if (!userData.name) {
    window.location.href = 'relationship-engine.html';
    return;
  }

  let sessionId = 'onboarding-' + Math.random().toString(36).substr(2, 9);
  document.getElementById('displaySessionId').innerText = sessionId.split('-')[1].toUpperCase();

  const questions = [
    { id: 'product', text: "To get us started: could you describe your main product or service in one simple sentence?" },
    { id: 'audience', text: "Great. Who is your ideal target audience (specific industries, roles, or founders)?" },
    { id: 'bottleneck', text: "Understood. What is your current biggest marketing or sales bottleneck right now?" },
    { id: 'style', text: "I see. Do you have a sales team handling leads, or are you looking for fully automated relationship nurturing?" },
    { id: 'economics', text: "Makes sense. Roughly, what's your average Price for a product/service or income from a single customer?" },
    { id: 'goal', text: "Finally, what's the ONE thing you want the Relationship Engine to solve for your business first?" }
  ];

  let currentQuestionIndex = 0;
  let isAwaitingHandover = false;

  function addMessage(role, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.innerHTML = text.replace(/\n/g, '<br>');
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant typing';
    typingDiv.id = 'activeTyping';
    typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return typingDiv;
  }

  function removeTyping() {
    const typing = document.getElementById('activeTyping');
    if (typing) typing.remove();
  }

  async function callBrain(message, directive = "") {
    try {
      const payload = { sessionId, message };
      if (directive) payload.message = directive + "\n\nUser response: " + message;
      
      const response = await fetch(`${API_BASE}/kimani-ai-core/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error('AI Error');
      return await response.json();
    } catch (e) {
      console.error(e);
      return { response: "I've noted that down. Let's move to the next part." };
    }
  }

  async function initDiscovery() {
    showTyping();
    await new Promise(r => setTimeout(r, 1000));
    removeTyping();
    addMessage('assistant', `Hey ${userData.name}, welcome 👋🏾 Glad you're here. [BURST] I have 6 small questions to help me understand ${userData.business} properly so I can build the right strategy for you. [BURST] We'll be very brief, and this isn't for "leads" — it's for genuine custom engineering.`);
    
    await new Promise(r => setTimeout(r, 1200));
    addMessage('assistant', questions[0].text);
  }

  async function handleSend() {
    const text = chatInput.value.trim();
    if (!text || isAwaitingHandover) return;
    
    chatInput.value = '';
    this.style.height = 'auto'; // Reset textarea height
    addMessage('user', text);
    
    showTyping();

    // Directive tells AI how to acknowledge based on current question
    const acknowledgingDirective = `[INTERNAL_SYSTEM_DIRECTIVE]: The user is answering the question about "${questions[currentQuestionIndex].id}". 
    YOUR TASK: 
    1. Acknowledge/mirror their answer in 2 short, human bubbles using [BURST].
    2. DO NOT ASK ANY NEW QUESTIONS. I repeat: NO QUESTIONS.
    3. Be brief and supportive.`;

    const data = await callBrain(text, acknowledgingDirective);
    removeTyping();

    if (data.bursts) {
      for (const b of data.bursts) {
        addMessage('assistant', b);
        await new Promise(r => setTimeout(r, 800));
      }
    } else {
      addMessage('assistant', data.response);
    }

    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      await new Promise(r => setTimeout(r, 1500));
      showTyping();
      await new Promise(r => setTimeout(r, 800));
      removeTyping();
      addMessage('assistant', questions[currentQuestionIndex].text);
    } else {
      isAwaitingHandover = true;
      await new Promise(r => setTimeout(r, 1500));
      showTyping();
      await new Promise(r => setTimeout(r, 1200));
      removeTyping();
      addMessage('assistant', `Thanks for sharing all this, ${userData.name}. I've got a great picture of ${userData.business} now.`);
      await new Promise(r => setTimeout(r, 1000));
      addMessage('assistant', "I'm handing these details over to Kimani right now for a strategic review. You'll be hearing from him soon.");
      finish();
    }
  }

  function finish() {
    inputArea.style.display = 'none';
    setTimeout(() => {
      finishText.innerText = `Everything is set, ${userData.name}. Our systems are processing your business profile. Kimani will review the Relationship Agent's report and reach out to you via ${userData.email} personally very soon.`;
      finishOverlay.style.display = 'flex';
    }, 2000);
  }

  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keydown', function(e) { 
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend.call(this); 
    }
  });

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  initDiscovery();
});
</script>

</body>
</html>
