<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery Session | Marketing with Kimani</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/Logo Kimani.png">
  <style>
    :root {
      --clr-bg-deep: #050505;
      --clr-accent: #c8f230;
      --glass: rgba(255, 255, 255, 0.03);
    }
    body { 
      background-color: var(--clr-bg-deep); 
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .discovery-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 1.5rem;
      padding-top: 80px;
      height: 100vh;
      box-sizing: border-box;
    }

    .chat-window {
      flex: 1;
      background: var(--clr-bg2);
      border: 1px solid var(--clr-border);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      position: relative;
    }

    .chat-header {
      padding: 1.5rem 2.5rem;
      background: var(--clr-bg3);
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-info { display: flex; gap: 1rem; align-items: center; }
    .agent-avatar { width: 48px; height: 48px; background: var(--clr-accent); color: #0b0b0b; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
    .agent-name { font-weight: 700; color: var(--clr-white); font-size: 1.1rem; }
    .agent-status { font-size: 0.8rem; color: var(--clr-accent); opacity: 0.8; }

    .chat-messages { 
      flex: 1; 
      padding: 2.5rem; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 1.5rem;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--clr-border); border-radius: 10px; }

    .message { 
      max-width: 75%; 
      padding: 1.2rem 1.6rem; 
      border-radius: 20px; 
      line-height: 1.6; 
      font-size: 1rem; 
      animation: fadeInUp 0.5s ease forwards;
      position: relative;
    }
    .message.assistant { 
      align-self: flex-start; 
      background: var(--clr-bg3); 
      color: var(--clr-white); 
      border-bottom-left-radius: 4px; 
      border: 1px solid var(--clr-border);
    }
    .message.user { 
      align-self: flex-end; 
      background: var(--clr-accent); 
      color: #0b0b0b; 
      border-bottom-right-radius: 4px; 
      font-weight: 500;
    }

    .chat-input-area { 
      padding: 2rem 2.5rem; 
      background: var(--clr-bg3); 
      border-top: 1px solid var(--clr-border); 
      display: flex; 
      gap: 1rem;
      align-items: flex-end;
    }
    #chatInput { 
      flex: 1; 
      background: var(--clr-bg2); 
      border: 1px solid var(--clr-border); 
      padding: 1rem 1.5rem; 
      border-radius: 16px; 
      color: var(--clr-white); 
      outline: none; 
      font-family: var(--ff-body);
      font-size: 1rem;
      resize: none;
      max-height: 150px;
      transition: border-color 0.3s;
    }
    #chatInput:focus { border-color: var(--clr-accent); }
    
    .typing-indicator { display: flex; gap: 5px; padding: 10px 0; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--clr-accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .finish-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,0.9);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem;
      z-index: 10;
    }
    .finish-overlay h2 { margin-bottom: 1rem; color: var(--clr-accent); }
    .finish-overlay p { color: var(--clr-muted); max-width: 500px; margin-bottom: 2rem; }

  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="container">
    <div class="nav-wrap">
      <a href="index.html" class="nav-logo">
        <img src="assets/Logo Kimani.png" alt="Kimani Logo">
        <span class="logo-text">Marketing with Kimani</span>
      </a>
      <div class="nav-menu">
        <a href="relationship-engine.html">Back to Engine</a>
      </div>
    </div>
  </div>
</nav>

<div class="discovery-container">
  <div class="chat-window">
    <div class="chat-header">
      <div class="header-info">
        <div class="agent-avatar">R</div>
        <div>
          <div class="agent-name">Relationship Agent</div>
          <div class="agent-status">Onboarding Discovery</div>
        </div>
      </div>
      <div style="font-size: 0.75rem; color: var(--clr-accent); border: 1px solid var(--clr-accent); padding: 0.3rem 0.8rem; border-radius: 6px; font-weight: 700; letter-spacing: 0.05em;">SECURE SESSION</div>
    </div>
    
    <div class="chat-messages" id="chatMessages"></div>
    
    <div class="chat-input-area" id="inputArea">
      <textarea id="chatInput" rows="1" placeholder="Type your answer..."></textarea>
      <button id="sendBtn" class="btn btn-primary" style="padding: 1rem 1.8rem;">Send</button>
    </div>

    <div class="finish-overlay" id="finishOverlay">
      <div style="font-size: 4rem; margin-bottom: 2rem;">🤝🏾</div>
      <h2>Strategic Handover Initiated</h2>
      <p id="finishText"></p>
      <a href="index.html" class="btn btn-primary">Return to Homepage</a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const chatMessages = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const inputArea = document.getElementById('inputArea');
  const finishOverlay = document.getElementById('finishOverlay');
  const finishText = document.getElementById('finishText');

  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:3010' : '';
  const userData = JSON.parse(sessionStorage.getItem('onboarding_user') || '{}');
  
  if (!userData.name) {
    window.location.href = 'relationship-engine.html';
    return;
  }

  let sessionId = 'onboarding-' + Math.random().toString(36).substr(2, 9);

  function addMessage(role, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.innerHTML = text.replace(/\n/g, '<br>');
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant typing';
    typingDiv.id = 'activeTyping';
    typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return typingDiv;
  }

  function removeTyping() {
    const typing = document.getElementById('activeTyping');
    if (typing) typing.remove();
  }

  async function callBrain(message) {
    try {
      const response = await fetch(`${API_BASE}/kimani-ai-core/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message })
      });
      if (!response.ok) throw new Error('AI Error');
      return await response.json();
    } catch (e) {
      console.error(e);
      return { response: "I'm having a slight connection issue, but let's keep going. Tell me about your business?" };
    }
  }

  async function initDiscovery() {
    showTyping();
    // System instruction passed via first message
    const systemPrompt = `[INTERNAL_SYSTEM_DIRECTIVE]: User Name: ${userData.name}, Business: ${userData.business}, Country: ${userData.country}, Email: ${userData.email}, Phone: ${userData.phone}. 
    GOAL: You are the Relationship Agent conducting a discovery session. 
    1. EXPLAIN carefully that these are brief questions to help you understand them better, NOT for lead generation. Tell them this so they feel comfortable opening up. Promise to be brief.
    2. Ask about their main product, audience, bottlenecks, team, ticket size, and one thing the Engine should solve. 
    3. Be adaptable. If they ask a question, answer it and pivot back. 
    4. When finished (after ~6 questions), finish your message with the exact tag: [DISCOVERY_COMPLETE].`;

    const data = await callBrain(systemPrompt);
    removeTyping();
    
    if (data.bursts) {
      for (const b of data.bursts) {
        addMessage('assistant', b);
        await new Promise(r => setTimeout(r, 800));
      }
    } else if (data.response) {
      addMessage('assistant', data.response);
    }
  }

  async function handleSend() {
    const text = chatInput.value.trim();
    if (!text) return;
    chatInput.value = '';
    addMessage('user', text);
    
    showTyping();
    const data = await callBrain(text);
    removeTyping();

    if (data.bursts) {
      for (const b of data.bursts) {
        processResponse(b);
        await new Promise(r => setTimeout(r, 1000));
      }
    } else if (data.response) {
      processResponse(data.response);
    }
  }

  function processResponse(text) {
    if (text.includes('[DISCOVERY_COMPLETE]')) {
      const cleanText = text.replace('[DISCOVERY_COMPLETE]', '');
      addMessage('assistant', cleanText);
      finish();
    } else {
      addMessage('assistant', text);
    }
  }

  function finish() {
    inputArea.style.display = 'none';
    setTimeout(() => {
      finishText.innerText = `Everything is set, ${userData.name}. Our systems are processing your business profile. Kimani will review the Relationship Agent's report and reach out to you via ${userData.email} personally very soon.`;
      finishOverlay.style.display = 'flex';
    }, 2000);
  }

  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keypress', (e) => { 
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend(); 
    }
  });

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  initDiscovery();
});
</script>

</body>
</html>
